<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phần Mềm Quản Lý Gia Phả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-100 text-stone-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-gradient-to-r from-stone-900 to-stone-800 border-b border-stone-700 text-stone-50 px-3 py-2.5 md:px-5 md:py-3 shadow-lg flex justify-between items-center shrink-0 z-40">
        
        <div class="flex items-center gap-3 md:gap-5">
            <div class="flex items-center gap-1.5">
                <span class="text-xl md:text-2xl drop-shadow-md">🌳</span>
                <h1 class="hidden sm:block text-lg md:text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 uppercase">
                    Gia Phả
                </h1>
            </div>
            
            <div class="w-px h-6 bg-stone-700 hidden sm:block"></div>
            
            <div class="flex flex-col leading-tight">
                <span class="text-[10px] md:text-xs text-stone-400 font-medium tracking-widest">Xin chào,</span>
                <b id="user-greeting" class="text-xs md:text-sm text-amber-400 truncate max-w-[100px] md:max-w-[200px]"></b>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            
            <button onclick="app.openStats()" title="Xem chi tiết thống kê"
                class="group flex items-center gap-2 md:gap-3 h-8 bg-stone-800 hover:bg-stone-700 px-2.5 md:px-3 py-1.5 rounded-lg border border-stone-600 hover:border-amber-500/50 transition-all shadow-inner">
                
                <div class="flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4 text-stone-400 group-hover:text-amber-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span class="hidden md:inline text-stone-300 text-xs md:text-sm">Tổng:</span>
                    <span id="total-members-badge" class="font-bold text-amber-400 text-xs md:text-sm">0</span>
                </div>
                
                <div class="hidden lg:block w-px h-4 bg-stone-600"></div>
                
                <div class="hidden lg:block text-stone-300 text-xs">
                    Ruột: <span id="blood-members-badge" class="font-bold text-blue-400">0</span>
                </div>
                
                <div class="hidden lg:block text-stone-300 text-xs">
                    Dâu rể: <span id="inlaw-members-badge" class="font-bold text-pink-400">0</span>
                </div>
            </button>

            <div class="w-px h-6 bg-stone-700 hidden md:block"></div>

            <div class="flex items-center gap-1.5 md:gap-2">
                <button onclick="app.exportExcel()" title="Xuất Excel"
                    class="flex items-center justify-center gap-1.5 w-8 h-8 md:w-auto md:h-auto md:px-3 md:py-1.5 rounded-lg bg-stone-800 hover:bg-emerald-600 text-stone-300 hover:text-white border border-stone-600 hover:border-emerald-500 transition-all shadow-sm">
                    <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span class="hidden md:inline text-xs md:text-sm font-semibold">Excel</span>
                </button>

                <button onclick="app.exportPDF()" title="Xuất PDF"
                    class="flex items-center justify-center gap-1.5 w-8 h-8 md:w-auto md:h-auto md:px-3 md:py-1.5 rounded-lg bg-stone-800 hover:bg-sky-600 text-stone-300 hover:text-white border border-stone-600 hover:border-sky-500 transition-all shadow-sm">
                    <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    <span class="hidden md:inline text-xs md:text-sm font-semibold">PDF</span>
                </button>

                <button onclick="app.openChangePassword()" title="Đổi mật khẩu"
                    class="flex items-center justify-center gap-1.5 w-8 h-8 md:w-auto md:h-auto md:px-3 md:py-1.5 rounded-lg bg-stone-800 hover:bg-amber-500 text-stone-300 hover:text-white border border-stone-600 hover:border-amber-400 transition-all shadow-sm">
                    <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                    <span class="hidden md:inline text-xs md:text-sm font-semibold">Đổi MK</span>
                </button>

                <button onclick="app.logout()" title="Đăng xuất"
                    class="flex items-center justify-center gap-1.5 w-8 h-8 md:w-auto md:h-auto md:px-3 md:py-1.5 rounded-lg bg-stone-800 hover:bg-rose-600 text-stone-300 hover:text-white border border-stone-600 hover:border-rose-500 transition-all shadow-sm">
                    <svg class="w-4 h-4 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="hidden md:inline text-xs md:text-sm font-semibold">Thoát</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <section class="flex-1 overflow-auto relative bg-stone-200/50 flex flex-col" id="tree-container">
            <div id="zoom-area" class="min-w-max min-h-max p-10 md:p-20 flex justify-center">
                <div id="family-tree-wrapper" class="pb-32 md:pb-20"></div>
            </div>
            
            <!-- Zoom controls -->
            <div class="fixed bottom-6 left-4 md:left-6 bg-white rounded-lg shadow-lg border border-stone-200 flex items-center p-1 z-30 opacity-90 hover:opacity-100">
                <button onclick="app.zoomOut()" class="p-2 text-stone-600 hover:bg-stone-100 rounded font-bold">➖</button>
                <span id="zoom-level" class="px-2 md:px-4 text-xs md:text-sm font-semibold text-amber-700 min-w-[3rem] md:min-w-[4rem] text-center">100%</span>
                <button onclick="app.zoomIn()" class="p-2 text-stone-600 hover:bg-stone-100 rounded font-bold">➕</button>
                <div class="w-px h-6 bg-stone-200 mx-1"></div>
                <button onclick="app.resetZoom()" title="Về đầu cây" class="p-2 text-stone-600 hover:bg-amber-50 hover:text-amber-700 rounded transition-colors">🏠</button>
            </div>

            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center bg-stone-100 hidden z-20 px-4 text-center">
                <p class="text-lg md:text-xl text-stone-500 mb-4">Gia phả hiện đang trống.</p>
                <button onclick="app.startAdding(null)" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg">
                    ➕ Bắt đầu tạo Thủy Tổ
                </button>
            </div>

            <!-- Nút nổi mở panel trên Mobile -->
            <button onclick="app.toggleMobilePanel()" class="md:hidden fixed bottom-6 right-4 bg-amber-600 hover:bg-amber-700 text-white w-12 h-12 rounded-full shadow-2xl z-30 flex items-center justify-center text-xl border-2 border-white">
                📊
            </button>
        </section>

        <!-- Side Panel -->
        <section id="side-panel" class="fixed inset-y-0 right-0 w-full sm:w-[400px] md:relative md:w-[400px] bg-white border-l border-stone-200 shadow-2xl md:shadow-xl flex flex-col shrink-0 z-50 transform translate-x-full md:translate-x-0 transition-transform duration-300">
            
            <div class="md:hidden flex justify-between items-center p-3 border-b border-stone-200 bg-stone-100 shrink-0">
                <h2 class="text-base font-bold text-stone-700 uppercase tracking-wider">Bảng điều khiển</h2>
                <button onclick="app.toggleMobilePanel()" class="bg-stone-300 hover:bg-stone-400 text-stone-800 rounded-full w-8 h-8 flex items-center justify-center font-bold shadow-sm">✕</button>
            </div>

            <div id="panel-stats" class="p-6 flex-1 overflow-y-auto">
                <h2 class="text-xl font-bold text-stone-800 mb-2">Thống Kê Tổng Quan</h2>
                <div class="bg-stone-50 rounded-xl p-4 border border-stone-100 mb-6 mt-4">
                    <div class="chart-container"><canvas id="genderChart"></canvas></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-stone-50 p-4 rounded-xl border border-stone-100 text-center">
                        <p class="text-stone-500 text-xs font-semibold">SỐ ĐỜI</p>
                        <p id="stat-generations" class="text-3xl font-bold text-amber-600 mt-1">0</p>
                    </div>
                    <div class="bg-stone-50 p-4 rounded-xl border border-stone-100 text-center">
                        <p class="text-stone-500 text-xs font-semibold">NĂM SINH GẦN NHẤT</p>
                        <p id="stat-latest-year" class="text-xl font-bold text-stone-700 mt-2">-</p>
                    </div>
                </div>

                <!-- Bảng thống kê chi tiết -->
                <div class="mt-6">
                    <h3 class="text-sm font-bold text-stone-600 uppercase tracking-wider mb-3">Chi tiết thành viên</h3>
                    <div class="rounded-xl border border-stone-200 overflow-hidden">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-stone-100 text-stone-500 text-xs uppercase tracking-wide">
                                    <th class="text-left px-4 py-2.5 font-semibold">Phân loại</th>
                                    <th class="text-center px-3 py-2.5 font-semibold">Số người</th>
                                    <th class="text-center px-3 py-2.5 font-semibold">Tỷ lệ</th>
                                </tr>
                            </thead>
                            <tbody id="stat-table-body" class="divide-y divide-stone-100">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="panel-editor" class="p-6 flex-1 overflow-y-auto hidden flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="form-title" class="text-xl font-bold text-stone-800">Thông tin</h2>
                    <button onclick="app.closeEditor()" class="text-stone-400 hover:text-red-500 p-1 text-xl hidden md:block">✕</button>
                </div>
                <form id="member-form" onsubmit="app.saveMember(event)" class="space-y-4 flex-1">
                    <input type="hidden" id="f-id">
                    <input type="hidden" id="f-parentId">
                    <input type="hidden" id="f-spouseId">
                    <input type="hidden" id="f-spouse"><!-- backward compat -->

                    <!-- Avatar -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">Ảnh đại diện</label>
                        <div class="flex items-center gap-4">
                            <img id="f-avatar-preview" src="" alt="" 
                                class="w-20 h-20 rounded-full object-cover border-2 border-stone-200 hidden shrink-0">
                            <div class="flex-1">
                                <input type="file" id="f-avatar-input" accept="image/*" 
                                    class="w-full text-sm text-stone-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100 cursor-pointer">
                                <p class="text-xs text-stone-400 mt-1">Tối đa 300×300px, dung lượng ≤ 300KB</p>
                            </div>
                        </div>
                        <input type="hidden" id="f-avatar">
                    </div>

                    <!-- Tên -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">Họ và Tên *</label>
                        <input type="text" id="f-name" required class="w-full p-2 border rounded">
                    </div>

                    <!-- Giới tính + Vai vế -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Giới tính</label>
                            <select id="f-gender" class="w-full p-2 border rounded">
                                <option value="M">Nam</option>
                                <option value="F">Nữ</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Vai vế</label>
                            <input type="text" id="f-title" class="w-full p-2 border rounded">
                        </div>
                    </div>

                    <!-- Năm sinh + Năm mất -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Năm sinh</label>
                            <input type="number" id="f-birth" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">Năm mất</label>
                            <input type="number" id="f-death" class="w-full p-2 border rounded">
                        </div>
                    </div>

                    <!-- Vợ/Chồng (hiển thị khi đã có liên kết) -->
                    <div id="spouse-info" class="hidden">
                        <label class="block text-sm font-semibold mb-1">Vợ / Chồng</label>
                        <div class="flex items-center gap-2 p-2.5 border border-pink-200 rounded-lg bg-pink-50">
                            <span class="text-base">❤️</span>
                            <span id="spouse-name-display" class="flex-1 text-sm font-semibold text-stone-800 truncate"></span>
                            <button type="button" onclick="app.viewSpouse()"
                                class="text-xs font-semibold text-blue-600 hover:text-blue-800 hover:underline px-1 shrink-0">Xem</button>
                            <span class="text-stone-300">|</span>
                            <button type="button" onclick="app.unlinkSpouse()"
                                class="text-xs font-semibold text-red-500 hover:text-red-700 hover:underline px-1 shrink-0">Hủy liên kết</button>
                        </div>
                    </div>

                    <!-- Ghi chú -->
                    <div>
                        <label class="block text-sm font-semibold mb-1">Ghi chú</label>
                        <textarea id="f-desc" rows="2" class="w-full p-2 border rounded"></textarea>
                    </div>

                    <!-- Action buttons -->
                    <div class="pt-4 flex gap-2 flex-wrap">
                        <button type="submit"
                            class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded font-bold flex-1">
                            💾 Lưu
                        </button>
                        <button type="button" id="btn-add-child" onclick="app.startAddingChild()"
                            class="bg-stone-700 hover:bg-stone-800 text-white px-3 py-2 rounded font-bold hidden text-sm">
                            ➕ Con
                        </button>
                        <button type="button" id="btn-add-spouse" onclick="app.startAddingSpouse()"
                            class="bg-pink-600 hover:bg-pink-700 text-white px-3 py-2 rounded font-bold hidden text-sm">
                            💑 Vợ/Chồng
                        </button>
                    </div>
                    <button type="button" id="btn-delete" onclick="app.deleteMember()"
                        class="text-red-500 hover:bg-red-50 px-3 py-2 rounded text-sm font-medium w-full hidden mt-2">
                        🗑 Xóa người này
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="app.js"></script>

    <!-- Modal Đổi mật khẩu -->
    <div id="change-password-modal" class="hidden fixed inset-0 bg-stone-900/70 backdrop-blur-sm z-50 flex items-center justify-center px-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl border border-stone-200">
            <h3 class="text-xl font-bold text-stone-800 mb-1">🔑 Đổi mật khẩu</h3>
            <p class="text-stone-400 text-sm mb-6">Nhập mật khẩu hiện tại để xác nhận</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-1">Mật khẩu hiện tại</label>
                    <input type="password" id="cp-old" placeholder="••••••••"
                        class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-1">Mật khẩu mới</label>
                    <input type="password" id="cp-new" placeholder="••••••••"
                        class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-1">Nhập lại mật khẩu mới</label>
                    <input type="password" id="cp-confirm" placeholder="••••••••"
                        class="w-full p-2.5 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none text-sm">
                </div>
                <p id="cp-error" class="hidden text-red-500 text-sm font-medium text-center"></p>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="app.submitChangePassword()"
                    class="flex-1 bg-amber-600 hover:bg-amber-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors shadow">
                    Xác nhận
                </button>
                <button onclick="app.closeChangePassword()"
                    class="flex-1 bg-stone-200 hover:bg-stone-300 text-stone-700 font-bold py-2.5 rounded-lg text-sm transition-colors">
                    Hủy
                </button>
            </div>
        </div>
    </div>
</body>
</html>
