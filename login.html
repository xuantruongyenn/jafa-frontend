<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Phả - Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-stone-800 p-4">
    <div class="bg-white p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-md border border-stone-200">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-amber-700 mb-2">🌳 Gia Phả</h1>
        <p id="auth-subtitle" class="text-sm md:text-base text-center text-stone-500 mb-6">Đăng nhập để quản lý gia phả của bạn</p>
        
        <form id="auth-form" class="space-y-4">
            <!-- Tài khoản -->
            <div id="group-username">
                <label class="block text-sm font-semibold text-stone-700 mb-1">Tài khoản</label>
                <input type="text" id="auth-username" required class="w-full p-2.5 md:p-3 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-500 outline-none text-sm md:text-base">
            </div>

            <!-- Hiển thị Câu hỏi bảo mật (Quên MK) -->
            <div id="group-sec-display" class="hidden">
                <label class="block text-sm font-semibold text-stone-700 mb-1">Câu hỏi bảo mật</label>
                <p id="auth-sec-q-text" class="w-full p-2.5 md:p-3 border border-stone-200 bg-amber-50 text-amber-800 font-semibold rounded-md text-sm md:text-base"></p>
            </div>

            <!-- Chọn Câu hỏi bảo mật (Đăng ký) -->
            <div id="group-sec-select" class="hidden">
                <label class="block text-sm font-semibold text-stone-700 mb-1">Câu hỏi bảo mật</label>
                <select id="auth-sec-question" class="w-full p-2.5 md:p-3 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-500 outline-none text-sm md:text-base">
                    <option value="Tên con vật nuôi đầu tiên của bạn?">Tên con vật nuôi đầu tiên của bạn?</option>
                    <option value="Tên trường tiểu học của bạn là gì?">Tên trường tiểu học của bạn là gì?</option>
                    <option value="Tên người bạn thân nhất thời thơ ấu?">Tên người bạn thân nhất thời thơ ấu?</option>
                    <option value="Món ăn yêu thích nhất của bạn?">Món ăn yêu thích nhất của bạn?</option>
                </select>
            </div>

            <!-- Câu trả lời -->
            <div id="group-sec-answer" class="hidden">
                <label class="block text-sm font-semibold text-stone-700 mb-1">Câu trả lời</label>
                <input type="text" id="auth-sec-answer" class="w-full p-2.5 md:p-3 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-500 outline-none text-sm md:text-base" placeholder="Nhập câu trả lời...">
            </div>

            <!-- Mật khẩu -->
            <div id="group-password">
                <label id="label-password" class="block text-sm font-semibold text-stone-700 mb-1">Mật khẩu</label>
                <input type="password" id="auth-password" class="w-full p-2.5 md:p-3 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-500 outline-none text-sm md:text-base">
            </div>
            
            <!-- Nhập lại Mật khẩu -->
            <div id="group-confirm" class="hidden">
                <label class="block text-sm font-semibold text-stone-700 mb-1">Nhập lại mật khẩu</label>
                <input type="password" id="auth-confirm-password" class="w-full p-2.5 md:p-3 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-500 outline-none text-sm md:text-base">
            </div>

            <!-- Link Quên mật khẩu -->
            <div id="auth-forgot-link" class="text-right">
                <button type="button" onclick="auth.setMode('FORGOT_GET_Q')" class="text-sm font-semibold text-amber-600 hover:underline">Quên mật khẩu?</button>
            </div>

            <div id="auth-error" class="text-red-500 text-sm hidden font-medium text-center"></div>
            
            <!-- Nút submit chính -->
            <button type="submit" id="auth-btn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded-md transition-colors mt-2 text-sm md:text-base shadow-lg">
                Đăng Nhập
            </button>
            
            <!-- Nút Quay lại -->
            <button type="button" id="auth-cancel-btn" onclick="auth.setMode('LOGIN')" class="hidden w-full bg-stone-300 hover:bg-stone-400 text-stone-800 font-bold py-3 px-4 rounded-md transition-colors mt-2 text-sm md:text-base">
                Quay lại Đăng nhập
            </button>
        </form>
        
        <div id="auth-footer" class="mt-6 text-center text-sm text-stone-600 border-t border-stone-100 pt-4">
            <span id="auth-toggle-text">Chưa có tài khoản?</span> 
            <button onclick="auth.setMode('REGISTER')" id="auth-toggle-btn" class="font-bold text-amber-600 hover:underline">Tạo tài khoản mới</button>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
